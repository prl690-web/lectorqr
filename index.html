<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lector QR #SaludUAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --ual-blue: #003C71;
            --ual-accent: #0076c0;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --info: #3498db;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body { font-family: 'Catamaran', sans-serif; background-color: var(--bg); margin: 0; color: var(--text-main); }

        /* --- FEEDBACK VISUAL --- */
        #visual-feedback {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; color: white; text-align: center; padding: 30px; box-sizing: border-box;
        }
        #visual-feedback h2 { font-size: 3.2rem; margin: 0; font-weight: 800; line-height: 1; }

        /* --- LOGIN & CARDS --- */
        .login-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--ual-blue) 0%, #0056a3 100%); padding: 20px; box-sizing: border-box; }
        .login-card { background: rgba(255, 255, 255, 0.98); border-radius: 35px; padding: 45px 30px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); text-align: center; }
        
        .logo-container { width: 100px; height: 100px; margin: 0 auto 25px; position: relative; background: var(--white); border-radius: 24px; display: flex; align-items: center; justify-content: center; border: 2px solid #f1f5f9; }
        .scanner-svg { width: 60px; height: 60px; fill: var(--ual-blue); }
        .laser { position: absolute; width: 80%; height: 3px; background: var(--danger); left: 10%; top: 20%; animation: scanning 2.5s infinite ease-in-out; box-shadow: 0 0 8px var(--danger); }
        @keyframes scanning { 0%, 100% { top: 20%; } 50% { top: 80%; } }

        /* --- ADMIN DASHBOARD --- */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 20px; text-align: center; border: 1px solid #edf2f7; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .stat-card i { font-size: 1.5rem; display: block; margin-bottom: 5px; }
        .stat-val { font-size: 1.4rem; font-weight: 800; color: var(--ual-blue); display: block; }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }

        /* --- APP INTERFACE --- */
        .app-header { background: var(--ual-blue); color: white; padding: 20px; text-align: center; border-radius: 0 0 25px 25px; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        
        .asistente-card { background: var(--white); border-radius: 20px; padding: 16px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; border: 1px solid #f1f5f9; transition: 0.3s; }
        .asistente-card.presente { background: #f0fff4; border-color: #c6f6d5; border-left: 5px solid var(--success); }
        .avatar { width: 48px; height: 48px; border-radius: 14px; background: #e2e8f0; color: var(--ual-blue); display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0; }
        .presente .avatar { background: var(--success); color: white; }

        .btn-action { padding: 10px 15px; border-radius: 12px; border: none; font-weight: 800; font-size: 0.75rem; cursor: pointer; }
        .btn-marcar { background: var(--ual-blue); color: white; }
        .btn-desmarcar { background: #fee2e2; color: var(--danger); }

        input, select, button { width: 100%; padding: 16px; border-radius: 16px; border: 2px solid #e2e8f0; font-family: inherit; font-size: 1rem; box-sizing: border-box; }
        .btn-primary { background: var(--ual-blue); color: white; font-weight: 800; border: none; margin-top: 15px; }
        .btn-outline { background: white; color: var(--ual-blue); border: 2px solid var(--ual-blue); font-weight: 800; margin-top: 15px; }

        #reader { border-radius: 24px; overflow: hidden; border: 3px solid var(--ual-blue) !important; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 14px 28px; border-radius: 50px; color: white; z-index: 9999; display: none; font-weight: 600; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="visual-feedback">
    <div style="font-size: 5rem;" id="fb-icon"></div>
    <h2 id="fb-title"></h2>
    <p id="fb-name" style="font-size: 1.5rem; font-weight: 300;"></p>
</div>

<div id="toast"></div>

<div id="view-login" class="view active">
    <div class="login-screen">
        <div class="login-card">
            <div class="logo-container">
                <svg class="scanner-svg" viewBox="0 0 24 24"><path d="M3,11H5V13H3V11M11,5H13V9H11V5M7,11H9V13H7V11M5,5H9V9H5V5M15,5H19V9H15V5M3,3V9H9V3H3M15,3V9H21V3H15M3,15V21H9V15H3M3,17H5V19H3V17M11,17H13V19H11V17M13,15H15V17H13V15M17,15H19V17H17V15M19,17H21V19H19V17M15,19H17V21H15V19M19,19H21V21H19V19M11,11H13V13H11V11M13,11H15V13H13V11M17,11H19V13H17V11M13,13H15V15H13V13M15,13H17V15H15V13M11,13H13V15H11V13M5,15H9V19H5V15M15,11H17V13H15V11M17,13H19V15H17V13M19,13H21V15H19V13Z" /></svg>
                <div class="laser"></div>
            </div>
            <h2>SaludUAL</h2>
            <input type="text" id="verificador-name" placeholder="Tu Nombre" style="margin-bottom:12px">
            <select id="actividad-select" style="margin-bottom:12px"><option value="">Cargando actividades...</option></select>
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button onclick="intentarLogin()" class="btn-primary">ENTRAR</button>
            <button onclick="accesoAdmin()" style="background:none; border:none; color:var(--text-muted); margin-top:20px; font-size:0.85rem; text-decoration: underline;">Panel Admin</button>
        </div>
    </div>
</div>

<div id="view-admin" class="view">
    <div class="app-header">
        <h1>Dashboard Admin</h1>
    </div>
    <div class="container">
        <div class="admin-grid">
            <div class="stat-card"><span class="stat-val" id="adm-inscritos">0</span><span class="stat-label">👥 Inscritos</span></div>
            <div class="stat-card" style="border-bottom: 4px solid var(--success);"><span class="stat-val" id="adm-registrados">0</span><span class="stat-label">✅ Registrados</span></div>
            <div class="stat-card" style="border-bottom: 4px solid var(--warning);"><span class="stat-val" id="adm-pendientes">0</span><span class="stat-label">⏳ Pendientes</span></div>
            <div class="stat-card" style="border-bottom: 4px solid var(--info);"><span class="stat-val" id="adm-rapido">0</span><span class="stat-label">⚡ Rápido</span></div>
        </div>
        <button onclick="showView('view-login')" class="btn-primary">VOLVER AL LOGIN</button>
    </div>
</div>

<div id="view-app" class="view">
    <div class="app-header">
        <h1 id="display-actividad" style="margin:0; font-size: 1.2rem;"></h1>
        <span id="verif-name-display" style="font-size: 0.8rem; opacity: 0.8;"></span>
    </div>
    <div class="container">
        <div id="reader" style="margin-bottom:20px;"></div>
        <input type="text" id="input-search" placeholder="🔍 Buscar por DNI o Nombre..." onkeyup="filtrarLista()" style="margin-bottom:15px">
        <div id="lista-asistentes"></div>
        <button onclick="showView('view-registro-rapido')" class="btn-outline">➕ REGISTRO RÁPIDO</button>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--text-muted); margin-top:20px; width:100%">Cerrar Sesión</button>
    </div>
</div>

<div id="view-registro-rapido" class="view">
    <div class="container" style="margin-top: 30px;">
        <div class="login-card" style="max-width: none;">
            <h3 style="margin-top:0;">⚡ Registro Rápido</h3>
            <input type="text" id="reg-nombre" placeholder="Nombre completo" style="margin-bottom:12px">
            <input type="text" id="reg-dni" placeholder="DNI / NIE" style="margin-bottom:12px">
            <input type="email" id="reg-email" placeholder="Email" style="margin-bottom:12px">
            <button onclick="procesarRegistroRapido()" class="btn-primary">CONFIRMAR Y AÑADIR</button>
            <button onclick="showView('view-app')" style="border:none; background:none; color:var(--ual-blue); margin-top:10px; font-weight:800">Volver</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwJQMxFzVPBvTE6GfWfc47iMhDCtOmb5rPFXIXW5-nmF4xSziHjH4l9My_c3E0amSki/exec';
    let dbInscritos = [];
    let asistenciasLocales = new Set();
    let configActual = { verificador: '', actividad: '' };
    let html5QrCode;

    window.onload = async () => {
        try {
            const resp = await fetch(SCRIPT_URL + "?action=getActividades");
            const acts = await resp.json();
            const sel = document.getElementById('actividad-select');
            acts.forEach(a => sel.innerHTML += `<option value="${a}">${a}</option>`);
        } catch(e) { notify("Error de conexión", "#e74c3c"); }
    };

    function notify(msg, color = 'var(--ual-blue)') {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.background = color; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    async function intentarLogin() {
        const v = document.getElementById('verificador-name').value;
        const a = document.getElementById('actividad-select').value;
        const pass = document.getElementById('login-pass').value;
        if(!v || !a || !pass) return notify("Faltan datos", "#e74c3c");
        
        const resp = await fetch(`${SCRIPT_URL}?action=checkPass&type=escaneador&pass=${encodeURIComponent(pass)}`);
        const res = await resp.json();
        if(res.valid) {
            configActual = { verificador: v, actividad: a };
            document.getElementById('display-actividad').innerText = a;
            document.getElementById('verif-name-display').innerText = "Verificador: " + v;
            cargarDatos();
        } else notify("Contraseña incorrecta", "#e74c3c");
    }

    async function accesoAdmin() {
        const pass = prompt("Clave Admin:");
        if(!pass) return;
        const resp = await fetch(`${SCRIPT_URL}?action=checkPass&type=admin&pass=${encodeURIComponent(pass)}`);
        const res = await resp.json();
        if(res.valid) {
            const sResp = await fetch(SCRIPT_URL + "?action=getStats");
            const s = await sResp.json();
            document.getElementById('adm-inscritos').innerText = s.totalInscritos;
            document.getElementById('adm-registrados').innerText = s.totalAsistencias;
            document.getElementById('adm-pendientes').innerText = s.totalInscritos - s.totalAsistencias;
            document.getElementById('adm-rapido').innerText = s.registrosRapidos;
            showView('view-admin');
        } else alert("Error de acceso");
    }

    async function cargarDatos() {
        const resp = await fetch(SCRIPT_URL + "?action=getInscritos");
        dbInscritos = await resp.json();
        showView('view-app');
        renderLista();
    }

    function renderLista(f = "") {
        const cont = document.getElementById('lista-asistentes');
        cont.innerHTML = "";
        const deActividad = dbInscritos.filter(i => i.Actividad === configActual.actividad);
        const filtrados = deActividad.filter(i => i.Nombre.toLowerCase().includes(f.toLowerCase()) || i.DNI.includes(f));

        filtrados.forEach(i => {
            const presente = asistenciasLocales.has(i.DNI);
            const card = document.createElement('div');
            card.className = `asistente-card ${presente ? 'presente' : ''}`;
            card.innerHTML = `
                <div class="avatar">${i.Nombre.charAt(0)}</div>
                <div style="flex-grow:1"><b>${i.Nombre}</b><br><small>${i.DNI}</small></div>
                <button class="btn-action ${presente ? 'btn-desmarcar' : 'btn-marcar'}" onclick="gestionarAsistencia('${i.Nombre}','${i.DNI}', ${presente})">
                    ${presente ? 'ANULAR' : 'MARCAR'}
                </button>`;
            cont.appendChild(card);
        });
    }

    async function gestionarAsistencia(nombre, dni, esAnulacion, email = "", tipo = "MANUAL") {
        if (esAnulacion) asistenciasLocales.delete(dni);
        else asistenciasLocales.add(dni);
        renderLista();
        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ nombre, dni, actividad: configActual.actividad, verificador: configActual.verificador, tipo: esAnulacion ? "ANULACIÓN" : tipo, email }) });
    }

    function procesarRegistroRapido() {
        const n = document.getElementById('reg-nombre').value, d = document.getElementById('reg-dni').value, e = document.getElementById('reg-email').value;
        if(!n || !d || !e) return notify("Faltan datos", "#e74c3c");
        
        // AÑADIR AL LISTADO LOCAL INMEDIATAMENTE
        dbInscritos.unshift({ Nombre: n, DNI: d, Actividad: configActual.actividad });
        gestionarAsistencia(n, d, false, e, "Rápido");
        
        notify("⚡ Registrado y añadido a la lista");
        showView('view-app');
        document.getElementById('reg-nombre').value = ""; document.getElementById('reg-dni').value = ""; document.getElementById('reg-email').value = "";
    }

    function filtrarLista() { renderLista(document.getElementById('input-search').value); }
    function showView(id) { 
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
        if(id === 'view-app') iniciarEscaner();
        else if(html5QrCode) html5QrCode.stop();
    }

    function iniciarEscaner() {
        if(!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
            const enc = dbInscritos.find(i => (i.DNI === text || i.CodigoValidacion === text) && i.Actividad === configActual.actividad);
            if(enc && !asistenciasLocales.has(enc.DNI)) {
                gestionarAsistencia(enc.Nombre, enc.DNI, false);
                notify("✅ " + enc.Nombre);
            }
        }).catch(()=>{});
    }
</script>
</body>
</html>
