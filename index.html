<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector QR #SaludUAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --ual-blue: #003C71;
            --ual-accent: #0076c0;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --light: #f8f9fa;
            --dark: #2c3e50;
        }

        body {
            font-family: 'Catamaran', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            color: var(--dark);
            -webkit-tap-highlight-color: transparent;
        }

        /* Header Moderno */
        .header {
            background: var(--ual-blue);
            color: white;
            padding: 25px 15px;
            text-align: center;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .header h1 { margin: 0; font-size: 1.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 480px; margin: -20px auto 0; padding: 0 15px 100px; }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            border: 1px solid rgba(0,0,0,0.03);
        }

        /* Inputs y Botones Estilizados */
        input, select, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 2px solid #eee;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--ual-accent); outline: none; box-shadow: 0 0 8px rgba(0,118,192,0.2); }

        button {
            background: var(--ual-blue);
            color: white;
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:active { transform: scale(0.96); }
        .btn-outline { background: white; color: var(--ual-blue); border: 2px solid var(--ual-blue); }
        .btn-danger { background: var(--danger); }

        /* Lista de Asistentes */
        .item-asistente {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            background: #fff;
            transition: 0.3s;
            border: 1px solid #eee;
        }

        .item-asistente.presente {
            border-color: var(--success);
            background: #f0fff4;
        }

        .item-asistente .info b { display: block; font-size: 1.05rem; }
        .item-asistente .info span { font-size: 0.85rem; color: #7f8c8d; }

        /* Status Badges */
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .badge-success { background: var(--success); color: white; }
        .badge-wait { background: #eee; color: #777; }

        /* Toast Notifications */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            display: none;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { from { bottom: -50px; opacity: 0; } to { bottom: 30px; opacity: 1; } }

        /* Scanner Box */
        #reader { border-radius: 15px; overflow: hidden; border: none !important; }
        
        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="header">
    <h1>#SaludUAL</h1>
    <p style="margin:5px 0 0; font-weight:300; opacity:0.8">Control de Acceso Inteligente</p>
</div>

<div class="container">
    
    <div id="view-login" class="view active">
        <div class="card" style="margin-top: 20px;">
            <h2 style="text-align:center; color: var(--ual-blue)">Bienvenido</h2>
            <input type="text" id="verificador-name" placeholder="Tu Nombre y Apellidos">
            <select id="actividad-select"><option>Cargando actividades...</option></select>
            <input type="password" id="login-pass" placeholder="Contraseña de Acceso">
            <button onclick="intentarLogin()">COMENZAR VERIFICACIÓN</button>
            <button class="btn-outline" onclick="accesoAdmin()" style="margin-top:15px">PANEL ADMINISTRADOR</button>
        </div>
    </div>

    <div id="view-app" class="view">
        <div class="card" style="padding:10px; margin-top:20px;">
            <div id="reader"></div>
        </div>

        <div class="card">
            <input type="text" id="input-search" placeholder="🔍 Buscar por nombre o DNI..." onkeyup="filtrarLista()">
            <div id="count-box" style="font-size: 0.9rem; color: #666; margin-bottom: 10px;"></div>
            <div id="lista-asistentes">
                </div>
        </div>

        <button class="btn-outline" onclick="showView('view-registro-rapido')">➕ REGISTRO RÁPIDO</button>
        <button class="btn-danger" onclick="location.reload()" style="margin-top:15px">CERRAR SESIÓN</button>
    </div>

    <div id="view-registro-rapido" class="view">
        <div class="card" style="margin-top:20px;">
            <h3>📝 Nuevo Registro</h3>
            <input type="text" id="reg-nombre" placeholder="Nombre">
            <input type="text" id="reg-ape1" placeholder="Primer Apellido">
            <input type="text" id="reg-dni" placeholder="DNI / NIE">
            <input type="email" id="reg-email" placeholder="Email">
            <button onclick="procesarRegistroRapido()">CONFIRMAR REGISTRO</button>
            <button class="btn-outline" onclick="showView('view-app')">CANCELAR</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzaC2ciwm409oYmSvKVP7IViHk-wMWXOUL771r2sTbT7dGT7Ga25k5tl6jXpzttZcsXrA/exec';
    let dbInscritos = [];
    let asistenciasLocales = new Set(); // Para control visual rápido
    let configActual = { verificador: '', actividad: '' };
    let html5QrCode;

    // --- TOAST NOTIFICATION ---
    function notify(msg, type = 'success') {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        toast.style.background = type === 'success' ? 'var(--success)' : 'var(--danger)';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    // --- CARGA INICIAL ---
    window.onload = async () => {
        try {
            const resp = await fetch(SCRIPT_URL + "?action=getActividades");
            const acts = await resp.json();
            const sel = document.getElementById('actividad-select');
            sel.innerHTML = '<option value="">Seleccione la Actividad</option>';
            acts.forEach(a => sel.innerHTML += `<option value="${a}">${a}</option>`);
        } catch(e) { notify("Error cargando actividades", "error"); }
    };

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'view-app') iniciarEscaner();
    }

    function intentarLogin() {
        const v = document.getElementById('verificador-name').value;
        const a = document.getElementById('actividad-select').value;
        const p = document.getElementById('login-pass').value;

        if(!v || !a || p !== "1234") {
            notify("Datos incompletos o clave errónea", "error");
            return;
        }
        configActual = { verificador: v, actividad: a };
        cargarDatos();
    }

    async function cargarDatos() {
        notify("Sincronizando listado...");
        const resp = await fetch(SCRIPT_URL + "?action=getInscritos");
        dbInscritos = await resp.json();
        showView('view-app');
        renderLista();
    }

    function renderLista(f = "") {
        const cont = document.getElementById('lista-asistentes');
        const countBox = document.getElementById('count-box');
        cont.innerHTML = "";
        
        const filtrados = dbInscritos.filter(i => 
            i.Actividad === configActual.actividad && 
            (i.Nombre.toLowerCase().includes(f.toLowerCase()) || i.DNI.includes(f))
        );

        countBox.innerText = `Mostrando ${filtrados.length} personas`;

        filtrados.forEach(i => {
            const estaPresente = asistenciasLocales.has(i.DNI);
            const div = document.createElement('div');
            div.className = `item-asistente ${estaPresente ? 'presente' : ''}`;
            div.innerHTML = `
                <div class="info">
                    <b>${i.Nombre}</b>
                    <span>DNI: ${i.DNI}</span>
                </div>
                <div>
                    ${estaPresente 
                        ? `<button class="btn-outline" style="width:auto; padding:5px 10px; font-size:12px; border-color:var(--danger); color:var(--danger)" onclick="toggleAsistencia('${i.Nombre}','${i.DNI}', true)">DESMARCAR</button>`
                        : `<button style="width:auto; padding:8px 15px;" onclick="toggleAsistencia('${i.Nombre}','${i.DNI}', false)">MARCAR</button>`
                    }
                </div>
            `;
            cont.appendChild(div);
        });
    }

    function filtrarLista() { renderLista(document.getElementById('input-search').value); }

    // --- LOGICA DE REGISTRO (MARCAR / DESMARCAR) ---
    async function toggleAsistencia(nombre, dni, esAnulacion) {
        if (esAnulacion) {
            asistenciasLocales.delete(dni);
            notify("Asistencia anulada localmente");
        } else {
            asistenciasLocales.add(dni);
            notify(`✅ ${nombre} registrado`);
        }
        
        renderLista(document.getElementById('input-search').value);

        // Envío a Google Sheets (en segundo plano)
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                nombre: nombre,
                dni: dni,
                actividad: configActual.actividad,
                verificador: configActual.verificador,
                tipo: esAnulacion ? "ANULACIÓN" : "MANUAL"
            })
        });
    }

    function procesarRegistroRapido() {
        const n = document.getElementById('reg-nombre').value;
        const d = document.getElementById('reg-dni').value;
        const e = document.getElementById('reg-email').value;
        if(!n || !d) return notify("Nombre y DNI obligatorios", "error");
        
        toggleAsistencia(n, d, false);
        showView('view-app');
    }

    function iniciarEscaner() {
        if(!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
            const enc = dbInscritos.find(i => (i.DNI === text || i.CodigoValidacion === text) && i.Actividad === configActual.actividad);
            if(enc) {
                if(!asistenciasLocales.has(enc.DNI)) {
                    toggleAsistencia(enc.Nombre, enc.DNI, false);
                    vibratePhone(); // Feedback háptico
                } else {
                    notify("Ya estaba registrado", "warning");
                }
            } else {
                notify("QR no válido para esta actividad", "error");
            }
        }).catch(() => {});
    }

    function vibratePhone() { if(navigator.vibrate) navigator.vibrate(100); }
    function accesoAdmin() { const p = prompt("Clave:"); if(p==="adminUAL") showView('view-admin'); }
</script>
</body>
</html>
