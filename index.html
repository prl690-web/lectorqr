<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Asistencia QR</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f7f9; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; border: none !important; }
        #status { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; background: #e8f4fd; color: #2980b9; }
        .footer { margin-top: 20px; font-size: 0.8em; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Acceso</h2>
    <div id="reader"></div>
    <div id="status">Esperando escaneo de código...</div>
    <div class="footer">Asegúrate de dar permisos de cámara al navegador</div>
</div>

<script>
    // TU URL DE GOOGLE APPS SCRIPT
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwJQMxFzVPBvTE6GfWfc47iMhDCtOmb5rPFXIXW5-nmF4xSziHjH4l9My_c3E0amSki/exec';

    function onScanSuccess(decodedText) {
        // Pausar el escáner para evitar envíos duplicados
        html5QrcodeScanner.clear();
        
        document.getElementById('status').innerText = "Enviando registro...";
        document.getElementById('status').style.background = "#fff3cd";

        // Preparar los datos
        const datos = {
            codigo: decodedText,
            usuario: "Usuario General" // Aquí podrías poner lógica de perfiles más adelante
        };

        // ENVÍO A GOOGLE SHEETS
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // Evita bloqueos de seguridad del navegador
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        })
        .then(() => {
            document.getElementById('status').innerText = "¡REGISTRO EXITOSO!";
            document.getElementById('status').style.background = "#d4edda";
            document.getElementById('status').style.color = "#155724";
            
            // Reiniciar escáner después de 3 segundos para el siguiente usuario
            setTimeout(() => { location.reload(); }, 3000);
        })
        .catch(error => {
            alert("Error al enviar: " + error);
            location.reload();
        });
    }

    // Configuración del escáner
    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", 
        { 
            fps: 10, 
            qrbox: {width: 250, height: 250},
            aspectRatio: 1.0
        }
    );
    
    html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html>
