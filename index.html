<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaludUAL Pro - Sistema de Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --ual-blue: #003C71; --ual-accent: #0076c0; --success: #2ecc71;
            --danger: #e74c3c; --warning: #f1c40f; --bg: #f8fafc;
            --card: #ffffff; --text: #1e293b; --muted: #64748b;
        }

        /* MODO OSCURO AUTOMÁTICO */
        @media (prefers-color-scheme: dark) {
            :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; }
        }

        body { font-family: 'Catamaran', sans-serif; background-color: var(--bg); margin: 0; color: var(--text); transition: 0.3s; }

        /* --- SKELETON LOADERS --- */
        .skeleton { background: linear-gradient(90deg, var(--card) 25%, var(--bg) 50%, var(--card) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 15px; height: 80px; margin-bottom: 10px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* --- OFFLINE INDICATOR --- */
        #offline-tag { position: fixed; top: 10px; right: 10px; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; z-index: 10001; display: none; }
        .is-offline { background: var(--danger); color: white; display: block !important; }

        /* --- DASHBOARD & LAYOUT --- */
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--ual-blue), #001e3a); padding: 20px; }
        .card { background: var(--card); border-radius: 30px; padding: 30px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        
        /* FILTROS */
        .filter-bar { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .chip { padding: 8px 15px; border-radius: 20px; background: var(--card); border: 1px solid var(--muted); font-size: 0.8rem; cursor: pointer; white-space: nowrap; color: var(--muted); }
        .chip.active { background: var(--ual-blue); color: white; border-color: var(--ual-blue); }

        /* LISTA */
        .asistente-card { background: var(--card); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; border: 1px solid transparent; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .asistente-card.presente { border-left: 5px solid var(--success); background: rgba(46, 204, 113, 0.05); }
        .avatar { width: 45px; height: 45px; border-radius: 12px; background: var(--ual-blue); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; }

        /* ADMIN */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--muted); }
        .stat-box b { font-size: 1.5rem; color: var(--ual-accent); display: block; }

        input, select, button { width: 100%; padding: 16px; border-radius: 16px; border: 1px solid var(--muted); background: var(--card); color: var(--text); font-family: inherit; font-size: 1rem; box-sizing: border-box; margin-bottom: 10px; }
        .btn-primary { background: var(--ual-blue); color: white; font-weight: 800; border: none; cursor: pointer; }
        
        #reader { border-radius: 20px; overflow: hidden; border: 2px solid var(--ual-blue) !important; margin-bottom: 15px; }
        .view { display: none; } .view.active { display: block; }
    </style>
</head>
<body>

<div id="offline-tag">SIN CONEXIÓN (Modo Local)</div>

<div id="view-login" class="view active">
    <div class="login-screen">
        <div class="card" style="text-align:center">
            <h2 style="color:var(--ual-blue)">SaludUAL Pro</h2>
            <input type="text" id="verificador-name" placeholder="Nombre Verificador">
            <select id="actividad-select"><option value="">Cargando actividades...</option></select>
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button onclick="intentarLogin()" class="btn-primary">ACCEDER</button>
            <button onclick="accesoAdmin()" style="background:none; border:none; color:var(--muted); font-size:0.8rem">Panel Administración</button>
        </div>
    </div>
</div>

<div id="view-app" class="view">
    <div style="background:var(--ual-blue); color:white; padding:15px; text-align:center; border-radius:0 0 20px 20px">
        <h3 id="display-actividad" style="margin:0"></h3>
        <small id="sync-status">Sincronizado</small>
    </div>
    <div class="container">
        <div id="reader"></div>
        
        <div class="filter-bar">
            <div class="chip active" onclick="setFilter('todos', this)">Todos</div>
            <div class="chip" onclick="setFilter('pendientes', this)">Pendientes</div>
            <div class="chip" onclick="setFilter('presentes', this)">Presentes</div>
        </div>

        <input type="text" id="input-search" placeholder="🔍 Buscar por DNI o Nombre..." onkeyup="renderLista()">
        
        <div id="lista-asistentes">
            <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
        </div>

        <button onclick="showView('view-registro-rapido')" class="btn-primary" style="background:var(--success)">⚡ Registro Express</button>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--muted); width:100%; margin-top:10px">Finalizar</button>
    </div>
</div>

<div id="view-admin" class="view">
    <div class="container">
        <div class="card">
            <h3>Estado del Evento</h3>
            <div class="admin-grid">
                <div class="stat-box"><b id="adm-inscritos">-</b><small>Inscritos</small></div>
                <div class="stat-box"><b id="adm-registrados">-</b><small>Presentes</small></div>
                <div class="stat-box"><b id="adm-pendientes">-</b><small>Pendientes</small></div>
                <div class="stat-box"><b id="adm-rapido">-</b><small>Rápido</small></div>
            </div>
            <button onclick="showView('view-login')" class="btn-primary">CERRAR</button>
        </div>
    </div>
</div>

<div id="view-registro-rapido" class="view">
    <div class="container">
        <div class="card">
            <h3>Nuevo Registro In-Situ</h3>
            <input type="text" id="reg-nombre" placeholder="Nombre Completo">
            <input type="text" id="reg-dni" placeholder="DNI">
            <input type="email" id="reg-email" placeholder="Email">
            <button onclick="procesarRegistroRapido()" class="btn-primary">REGISTRAR</button>
            <button onclick="showView('view-app')" style="background:none; border:none; color:var(--muted)">Cancelar</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxo6FlI5HRGgvhsi2jeQ4QYeinJ9tmaClUGz2DwQLBzRktB9ANjw99pqtvWfXGVOp73Lw/exec';
    let dbInscritos = [];
    let asistenciasLocales = new Set();
    let colaOffline = JSON.parse(localStorage.getItem('colaOffline') || '[]');
    let currentFilter = 'todos';
    let html5QrCode;

    // --- MODO OFFLINE: Sincronización automática ---
    window.addEventListener('online', syncOfflineData);
    window.addEventListener('offline', () => document.getElementById('offline-tag').classList.add('is-offline'));

    async function syncOfflineData() {
        document.getElementById('offline-tag').classList.remove('is-offline');
        if (colaOffline.length === 0) return;
        
        document.getElementById('sync-status').innerText = "Sincronizando pendientes...";
        for (let item of [...colaOffline]) {
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(item) });
                colaOffline.shift();
                localStorage.setItem('colaOffline', JSON.stringify(colaOffline));
            } catch (e) { break; }
        }
        document.getElementById('sync-status').innerText = "Sincronizado";
    }

    // --- LÓGICA DE FILTROS ---
    function setFilter(f, el) {
        currentFilter = f;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        renderLista();
    }

    // --- LOGIN Y DATOS ---
    window.onload = async () => {
        try {
            const resp = await fetch(SCRIPT_URL + "?action=getActividades");
            const acts = await resp.json();
            const sel = document.getElementById('actividad-select');
            acts.forEach(a => sel.innerHTML += `<option value="${a}">${a}</option>`);
        } catch(e) { }
    };

    async function intentarLogin() {
        const pass = document.getElementById('login-pass').value;
        const v = document.getElementById('verificador-name').value;
        const a = document.getElementById('actividad-select').value;
        if(!v || !a) return alert("Faltan datos");

        const resp = await fetch(`${SCRIPT_URL}?action=checkPass&type=escaneador&pass=${encodeURIComponent(pass)}`);
        const res = await resp.json();
        if(res.valid) {
            configActual = { verificador: v, actividad: a };
            document.getElementById('display-actividad').innerText = a;
            cargarDatos();
        } else alert("Error de acceso");
    }

    async function cargarDatos() {
        const resp = await fetch(SCRIPT_URL + "?action=getInscritos");
        dbInscritos = await resp.json();
        showView('view-app');
        renderLista();
    }

    function renderLista() {
        const cont = document.getElementById('lista-asistentes');
        const search = document.getElementById('input-search').value.toLowerCase();
        cont.innerHTML = "";
        
        let filtrados = dbInscritos.filter(i => 
            i.Actividad === configActual.actividad && 
            (i.Nombre.toLowerCase().includes(search) || i.DNI.includes(search))
        );

        if (currentFilter === 'pendientes') filtrados = filtrados.filter(i => !asistenciasLocales.has(i.DNI));
        if (currentFilter === 'presentes') filtrados = filtrados.filter(i => asistenciasLocales.has(i.DNI));

        filtrados.forEach(i => {
            const pres = asistenciasLocales.has(i.DNI);
            const card = document.createElement('div');
            card.className = `asistente-card ${pres ? 'presente' : ''}`;
            card.innerHTML = `
                <div class="avatar">${pres ? '✅' : i.Nombre.charAt(0)}</div>
                <div style="flex-grow:1"><b>${i.Nombre}</b><br><small>${i.DNI}</small></div>
                <button onclick="marcar('${i.Nombre}','${i.DNI}')" style="width:auto; padding:8px 12px; margin:0; font-size:0.7rem" class="btn-primary">
                    ${pres ? 'ANULAR' : 'MARCAR'}
                </button>`;
            cont.appendChild(card);
        });
    }

    async function marcar(nombre, dni, email = "", tipo = "MANUAL") {
        const esAnulacion = asistenciasLocales.has(dni);
        if (esAnulacion) asistenciasLocales.delete(dni);
        else asistenciasLocales.add(dni);
        
        renderLista();

        const data = { nombre, dni, actividad: configActual.actividad, verificador: configActual.verificador, tipo: esAnulacion ? "ANULACIÓN" : tipo, email };

        if (navigator.onLine) {
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        } else {
            colaOffline.push(data);
            localStorage.setItem('colaOffline', JSON.stringify(colaOffline));
            document.getElementById('offline-tag').classList.add('is-offline');
        }
    }

    function procesarRegistroRapido() {
        const n = document.getElementById('reg-nombre').value, d = document.getElementById('reg-dni').value, e = document.getElementById('reg-email').value;
        if(!n || !d) return alert("Faltan datos");
        dbInscritos.unshift({ Nombre: n, DNI: d, Actividad: configActual.actividad });
        marcar(n, d, e, "Rápido");
        showView('view-app');
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-app') { if(!html5QrCode) iniciarEscaner(); }
    }

    async function accesoAdmin() {
        const pass = prompt("Clave Admin:");
        const resp = await fetch(`${SCRIPT_URL}?action=checkPass&type=admin&pass=${encodeURIComponent(pass)}`);
        const res = await resp.json();
        if(res.valid) {
            const s = await (await fetch(SCRIPT_URL + "?action=getStats")).json();
            document.getElementById('adm-inscritos').innerText = s.totalInscritos;
            document.getElementById('adm-registrados').innerText = s.totalAsistencias;
            document.getElementById('adm-pendientes').innerText = s.totalInscritos - s.totalAsistencias;
            document.getElementById('adm-rapido').innerText = s.registrosRapidos;
            showView('view-admin');
        }
    }

    function iniciarEscaner() {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
            const enc = dbInscritos.find(i => (i.DNI === text || i.CodigoValidacion === text) && i.Actividad === configActual.actividad);
            if(enc && !asistenciasLocales.has(enc.DNI)) {
                marcar(enc.Nombre, enc.DNI);
                if(navigator.vibrate) navigator.vibrate(100);
            }
        }).catch(()=>{});
    }
</script>
</body>
</html>
